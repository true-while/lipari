remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "air"

# Site Settings
locale: "ru"
title: "Эолийские острова"
subtitle: "путеводитель\u00A0\u00A0 для\u00A0\u00A0 яхтсменов"
description: "Путеводитель по Эолийским островам — марины, якорные стоянки, достопримечательности, регаты"
url: "https://true-while.github.io"
baseurl: "/lipari"

# Build settings
encoding: "utf-8"
markdown: kramdown
kramdown:
  input: GFM

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Outputting
permalink: pretty

# Page defaults
defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false
      share: false
      related: false
      toc: true
      toc_sticky: true
      sidebar:
        nav: "main"
